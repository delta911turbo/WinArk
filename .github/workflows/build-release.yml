name: Build WinArk Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout (with submodules)
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup MSVC environment
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup vcpkg
      shell: pwsh
      run: |
        git clone https://github.com/microsoft/vcpkg C:\vcpkg
        C:\vcpkg\bootstrap-vcpkg.bat

    - name: Install dependencies
      shell: pwsh
      run: |
        C:\vcpkg\vcpkg install capstone[x86]:x86-windows-static
        C:\vcpkg\vcpkg install capstone[x86]:x64-windows-static
        C:\vcpkg\vcpkg install curlcpp:x86-windows-static
        C:\vcpkg\vcpkg install curlcpp:x64-windows-static
        C:\vcpkg\vcpkg install tinyxml2:x86-windows-static
        C:\vcpkg\vcpkg install tinyxml2:x64-windows-static

    - name: Integrate vcpkg with MSBuild
      shell: pwsh
      run: C:\vcpkg\vcpkg integrate install

    - name: Build Zydis (kernel configs)
      shell: pwsh
      run: |
        $zydis = Get-ChildItem -Recurse -Filter Zydis.sln | Select-Object -First 1
        if (-not $zydis) { throw "Zydis.sln not found" }

        msbuild "$($zydis.FullName)" /t:Zydis /m

    - name: Build WinArk Solution
      shell: pwsh
      run: |
        msbuild "Anti-Rootkit.sln" /p:Configuration=Release /p:Platform=x64 /p:WindowsTargetPlatformVersion=10.0.26100.0 /m

    - name: Collect artifacts
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path release -Force
        Get-ChildItem -Recurse -Include *.exe,*.dll,*.sys | Copy-Item -Destination release -Force

    - name: Archive release
      shell: pwsh
      run: |
        Compress-Archive -Path release\* -DestinationPath WinArk-${{ github.ref_name }}.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: WinArk-${{ github.ref_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
