name: Build WinArk Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  # Fix upcoming Node 24 enforcement warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout (with submodules)
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup MSVC environment
      uses: ilammy/msvc-dev-cmd@v1

    # --------------------------------------------------
    # REMOVE WDK INSTALL (this was the failure)
    # --------------------------------------------------

    # --------------------------------------------------
    # Setup vcpkg (REQUIRED)
    # --------------------------------------------------
    - name: Setup vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg C:\vcpkg
        C:\vcpkg\bootstrap-vcpkg.bat

    - name: Install dependencies
      run: |
        C:\vcpkg\vcpkg install capstone[x86]:x86-windows-static
        C:\vcpkg\vcpkg install capstone[x86]:x64-windows-static
        C:\vcpkg\vcpkg install curlcpp:x86-windows-static
        C:\vcpkg\vcpkg install curlcpp:x64-windows-static
        C:\vcpkg\vcpkg install tinyxml2:x86-windows-static
        C:\vcpkg\vcpkg install tinyxml2:x64-windows-static

    - name: Integrate vcpkg
      run: C:\vcpkg\vcpkg integrate install

    # --------------------------------------------------
    # Build Zydis FIRST
    # --------------------------------------------------
    - name: Build Zydis
      run: |
        msbuild dependencies\zydis\msvc\Zydis.sln ^
          /p:Configuration=Release ^
          /p:Platform=x64 ^
          /p:WindowsTargetPlatformVersion=10.0.26100.0 ^
          /m

        msbuild dependencies\zydis\msvc\Zycore.sln ^
          /p:Configuration=Release ^
          /p:Platform=x64 ^
          /p:WindowsTargetPlatformVersion=10.0.26100.0 ^
          /m

    # --------------------------------------------------
    # Build entire solution (includes driver)
    # --------------------------------------------------
    - name: Build WinArk Solution
      run: |
        msbuild Anti-Rootkit.sln ^
          /p:Configuration=Release ^
          /p:Platform=x64 ^
          /p:WindowsTargetPlatformVersion=10.0.26100.0 ^
          /m

    # --------------------------------------------------
    # Collect artifacts
    # --------------------------------------------------
    - name: Collect artifacts
      run: |
        mkdir release
        for /r %%i in (*.exe *.dll *.sys) do copy "%%i" release\

    # --------------------------------------------------
    # Archive
    # --------------------------------------------------
    - name: Archive
      run: powershell Compress-Archive -Path release\* -DestinationPath WinArk-${{ github.ref_name }}.zip

    # --------------------------------------------------
    # Release
    # --------------------------------------------------
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: WinArk-${{ github.ref_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
