name: Build WinArk Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022   # IMPORTANT: better WDK compatibility than latest

    steps:
    - name: Checkout (with submodules)
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup MSVC environment
      uses: ilammy/msvc-dev-cmd@v1

    # --------------------------------------------------
    # Install WDK (required for driver build)
    # --------------------------------------------------
    - name: Install Windows Driver Kit
      run: choco install windows-driver-kit --yes

    # --------------------------------------------------
    # Setup vcpkg (REQUIRED per build doc)
    # --------------------------------------------------
    - name: Setup vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg C:\vcpkg
        C:\vcpkg\bootstrap-vcpkg.bat

    - name: Install vcpkg dependencies
      run: |
        C:\vcpkg\vcpkg install capstone[x86]:x86-windows-static
        C:\vcpkg\vcpkg install capstone[x86]:x64-windows-static
        C:\vcpkg\vcpkg install curlcpp:x86-windows-static
        C:\vcpkg\vcpkg install curlcpp:x64-windows-static
        C:\vcpkg\vcpkg install tinyxml2:x86-windows-static
        C:\vcpkg\vcpkg install tinyxml2:x64-windows-static

    - name: Integrate vcpkg with MSBuild
      run: C:\vcpkg\vcpkg integrate install

    # --------------------------------------------------
    # Build Zydis FIRST (hard requirement from doc)
    # --------------------------------------------------
    - name: Build Zydis (kernel libs)
      run: |
        msbuild dependencies\zydis\msvc\Zydis.sln ^
          /p:Configuration=Release ^
          /p:Platform=x64 ^
          /m

        msbuild dependencies\zydis\msvc\Zycore.sln ^
          /p:Configuration=Release ^
          /p:Platform=x64 ^
          /m

    # --------------------------------------------------
    # Build driver FIRST
    # --------------------------------------------------
    - name: Build driver
      run: |
        msbuild Anti-Rootkit.sln ^
          /t:WinArkDrv ^
          /p:Configuration=Release ^
          /p:Platform=x64 ^
          /m

    # --------------------------------------------------
    # Build full solution (WinArk, service, etc.)
    # --------------------------------------------------
    - name: Build WinArk
      run: |
        msbuild Anti-Rootkit.sln ^
          /p:Configuration=Release ^
          /p:Platform=x64 ^
          /m

    # --------------------------------------------------
    # Collect outputs (paths may need slight adjustment)
    # --------------------------------------------------
    - name: Collect artifacts
      run: |
        mkdir release

        REM Main outputs (adjust after first run if needed)
        for /r %%i in (*.exe *.dll *.sys) do copy "%%i" release\

    # --------------------------------------------------
    # Archive
    # --------------------------------------------------
    - name: Archive release
      run: powershell Compress-Archive -Path release\* -DestinationPath WinArk-${{ github.ref_name }}.zip

    # --------------------------------------------------
    # Publish Release
    # --------------------------------------------------
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: WinArk-${{ github.ref_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
